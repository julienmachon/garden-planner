name: Lint HA add-on

on:
  push:
    paths:
      - "ha-addon/**"
  pull_request:
    paths:
      - "ha-addon/**"
  schedule:
    - cron: "0 8 * * 1"  # Every Monday morning

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lint add-on
        uses: frenck/action-addon-linter@v2
        with:
          path: ./ha-addon
