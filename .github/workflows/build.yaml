name: Build and push HA add-on

on:
  push:
    branches: [main]
    paths:
      - "mcp-server/**"
      - "ha-addon/**"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # needed to push the version bump commit
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Bump patch version
        id: version
        run: |
          VERSION=$(grep '^version:' ha-addon/config.yaml | awk '{print $2}' | tr -d '"')
          MAJOR=$(echo $VERSION | cut -d. -f1)
          MINOR=$(echo $VERSION | cut -d. -f2)
          PATCH=$(echo $VERSION | cut -d. -f3)
          NEW_VERSION="$MAJOR.$MINOR.$((PATCH + 1))"
          sed -i "s/version: \"$VERSION\"/version: \"$NEW_VERSION\"/" ha-addon/config.yaml
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Commit and push version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ha-addon/config.yaml
          git commit -m "chore: bump version to ${{ steps.version.outputs.version }}"
          git push

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ha-addon/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/garden-planner:${{ steps.version.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/garden-planner:latest
          build-args: |
            BUILD_VERSION=${{ steps.version.outputs.version }}
